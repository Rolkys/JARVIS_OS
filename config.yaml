jarvis:
  name: "JARVIS"
  wake_word: "jarvis"
  language: "es"

audio:
  sample_rate: 16000
  channels: 1
  silence_threshold: 500
  silence_duration: 1.5
  max_recording_duration: 10

whisper:
  model_size: "base"
  device: "cpu"
  compute_type: "int8"

mqtt:
  broker: "localhost"
  port: 1883
  topics:
    wake: "jarvis/wake"
    listening: "jarvis/listening"
    processing: "jarvis/processing"
    response: "jarvis/response"
    command: "jarvis/command"
    speak: "jarvis/speak"
    hud: "jarvis/hud"
    error: "jarvis/error"

ollama:
  host: "http://localhost:11434"
  model: "llama3.2:3b"
  system_prompt: >
    Eres JARVIS, asistente de IA de Stark Industries.
    Responde en español, de forma tecnica pero amigable.
    Maximo 3 frases. Se conciso y util.

tts:
  engine: "piper"
  voice: "es_ES-carlfm-medium"
  speed: 1.0
  models_dir: "./models"

hud:
  enabled: true
  width: 400
  height: 300
  position: "bottom-right"
  opacity: 0.9
  always_on_top: true